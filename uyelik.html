<!doctype html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Fit Tarifler | Üyelik</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <nav class="site-nav" aria-label="Site menüsü">
        <a class="brand" href="index.html">Fit Tarifler</a>
        <div class="nav-links">
          <a href="index.html">Ana sayfa</a>
          <a class="active" href="uyelik.html">Üye ol</a>
          <a href="giris.html">Üye girişi</a>
        </div>
      </nav>

      <section class="auth-layout" id="auth-layout">
        <form class="member-form auth-card" id="signup-form">
          <p class="eyebrow compact">Üyelik</p>
          <div class="form-grid single-column">
            <label>
              Ad soyad
              <input name="fullName" type="text" placeholder="Örnek: Ayşe Yılmaz" required />
            </label>
            <label>
              E-posta
              <input name="email" type="email" placeholder="ornek@mail.com" required />
            </label>
            <label>
              Şifre
              <input name="password" type="password" minlength="6" placeholder="En az 6 karakter" required />
            </label>
          </div>
          <button class="primary-link form-submit" type="submit">Üyeliğimi oluştur</button>
          <p class="form-note" id="signup-message">Firebase ayarları girilene kadar demo üyelik bu tarayıcıda saklanır.</p>
        </form>
      </section>

      <section class="wizard-modal hidden" id="wizard-section" aria-modal="true" role="dialog">
        <div class="wizard-backdrop"></div>
        <div class="wizard-shell">
          <div class="wizard-card">
            <button class="wizard-close" id="wizard-close" type="button" aria-label="Analizden çık">x</button>
            <div class="wizard-head">
              <p class="eyebrow compact" id="wizard-step-label">Profil botu</p>
              <h2 id="wizard-title">Başlayalım</h2>
              <p id="wizard-helper">Soruları sırayla cevapla, sonunda sana uygun tarifleri listeleyelim.</p>
            </div>

            <div class="wizard-progress" aria-hidden="true">
              <span id="wizard-progress-bar"></span>
            </div>

            <form id="wizard-form">
              <div class="wizard-body" id="wizard-body"></div>
              <div class="wizard-actions">
                <button class="secondary-link" id="wizard-back" type="button">Geri</button>
                <button class="primary-link" id="wizard-next" type="submit">İleri</button>
              </div>
            </form>
          </div>
        </div>
      </section>
    </main>

    <script src="tarif-katalog.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore-compat.js"></script>
    <script src="firebase-config.js"></script>
    <script src="firebase-service.js"></script>
    <script src="uyelik.js"></script>
  </body>
</html>
