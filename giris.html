<!doctype html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Fit Tarifler | Üye Girişi</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <nav class="site-nav" aria-label="Site menüsü">
        <a class="brand" href="index.html">Fit Tarifler</a>
        <div class="nav-links">
          <a href="index.html">Ana sayfa</a>
          <a href="uyelik.html">Üye ol</a>
          <a class="active" href="giris.html">Üye girişi</a>
        </div>
      </nav>

      <section class="auth-layout">
        <form class="member-form auth-card" id="login-form">
          <p class="eyebrow compact">Üye girişi</p>
          <div class="form-grid single-column">
            <label>
              E-posta
              <input name="email" type="email" placeholder="ornek@mail.com" required />
            </label>
            <label>
              Şifre
              <input name="password" type="password" placeholder="Şifren" required />
            </label>
          </div>
          <button class="primary-link form-submit" type="submit">Giriş yap</button>
          <button class="secondary-link form-submit" id="reset-password" type="button">Şifremi sıfırla</button>
          <p class="form-note" id="login-message">Firebase ayarları girilene kadar demo giriş bu tarayıcıdaki kaydı kontrol eder.</p>
        </form>
      </section>
    </main>

    <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore-compat.js"></script>
    <script src="firebase-config.js"></script>
    <script src="firebase-service.js"></script>
    <script src="giris.js"></script>
  </body>
</html>
